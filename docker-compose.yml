services:
  mylists:
    build: .
    ports:
      - "6000:3000"
    volumes:
      - mylists-data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/mylists.db
      - TMDB_API_KEY=${TMDB_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-mylists-production-secret}

volumes:
  mylists-data:
