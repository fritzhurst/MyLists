services:
  mylists:
    build: .
    ports:
      - "6001:3000"
    volumes:
      - mylists-data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/mylists.db
      - TMDB_API_KEY=${TMDB_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-mylists-production-secret}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - APP_URL=${APP_URL:-http://localhost:6001}

volumes:
  mylists-data:
